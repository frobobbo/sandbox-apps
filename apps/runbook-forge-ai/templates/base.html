<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Runbook Forge AI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem auto; max-width: 1100px; line-height: 1.5; color: #172033; }
    input, textarea, select { width: 100%; padding: .65rem; margin: .25rem 0 1rem; border: 1px solid #cbd5e1; border-radius: 8px; font: inherit; }
    textarea { min-height: 220px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    button, .button { background: #2563eb; color: white; border: 0; padding: .7rem 1rem; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; }
    .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
    .card { border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; background: #f8fafc; }
    .muted { color: #64748b; }
    @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>Runbook Forge AI</h1>
  <p class="muted">Convert raw troubleshooting notes into structured markdown runbooks. Deterministic local generation works without AI secrets.</p>
  {% block content %}{% endblock %}
</body>
</html>
